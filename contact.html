<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawConnect · Responsive Navbar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-[#FCF8F1] font-sans">

    <nav class="bg-[#F9F1E7] border-b border-[#E5D3BC] sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <a href="index.html" class="flex items-center gap-2">
            <i class="fas fa-paw text-2xl text-[#A67C52]"></i>
            <span class="text-2xl font-bold text-[#5C3E2E]">PawConnect</span>
          </a>

          <div class="hidden md:flex items-center gap-8">
            <a
              href="index.html"
              class="text-[#5C3E2E] font-semibold border-b-2 border-transparent hover:border-[#A67C52] transition-colors"
            >
              Home
            </a>
            <a
              href="adopt.html"
              class="text-[#7D5A44] font-semibold border-b-2 border-transparent hover:border-[#A67C52] transition-colors"
              >Adopt</a
            >
            <a
              href="pets.html"
              class="text-[#7D5A44] font-semibold border-b-2 border-transparent hover:border-[#A67C52] transition-colors"
              >Pets</a
            >
            <a
              href="howitworks.html"
              class="text-[#7D5A44] font-semibold border-b-2 border-transparent hover:border-[#A67C52] transition-colors"
              >How It Works</a
            >
            <a
              href="contact.html"
              class="text-[#7D5A44] font-semibold border-b-2 border-transparent hover:border-[#A67C52] transition-colors"
              >Contact</a
            >
            <a
              href="adopt.html"
              class="bg-[#A67C52] hover:bg-[#5C3E2E] text-white px-5 py-2 rounded-lg text-sm font-bold transition-all shadow-md"
              >Adopt Me</a
            >
          </div>

          <div class="md:hidden flex items-center">
            <button
              id="mobile-menu-button"
              class="text-[#5C3E2E] focus:outline-none p-2"
            >
              <i class="fas fa-bars text-2xl" id="menu-icon"></i>
            </button>
          </div>
        </div>
      </div>

      <div
        id="mobile-menu"
        class="hidden md:hidden bg-[#F9F1E7] border-t border-[#E5D3BC] pb-4 px-4 space-y-2"
      >
        <a
          href="index.html"
          class="block py-3 px-4 text-[#5C3E2E] font-semibold bg-[#FCF8F1] rounded-lg"
          >Home</a
        >
        <a
          href="adopt.html"
          class="block py-3 px-4 text-[#7D5A44] hover:bg-[#FCF8F1] rounded-lg"
          >Adopt</a
        >
        <a
          href="pets.html"
          class="block py-3 px-4 text-[#7D5A44] hover:bg-[#FCF8F1] rounded-lg"
          >Pets</a>
        <a
          href="howitworks.html"
          class="block py-3 px-4 text-[#7D5A44] hover:bg-[#FCF8F1] rounded-lg"
          >How It Works</a
        >
        <a
          href="contact.html"
          class="block py-3 px-4 text-[#7D5A44] hover:bg-[#FCF8F1] rounded-lg"
          >Contact</a
        >
        <div class="pt-2">
          <a
            href="adopt.html"
            class="block text-center bg-[#A67C52] text-white py-3 rounded-lg font-bold"
            >Adopt Me</a
          >
        </div>
      </div>
    </nav>

    <div class="p-10 text-center">
        <h2 class="text-[#5C3E2E] text-xl">Adopt a Pet</h2>
    </div>
    <script src="script.js"></script>
</body>
    </html>
