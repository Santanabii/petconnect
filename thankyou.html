<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You · PawConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-[#FCF8F1] font-sans text-[#5C3E2E] h-screen flex flex-col">

    <nav class="bg-[#F9F1E7] border-b border-[#E5D3BC]">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center">
            <a href="index.html" class="flex items-center gap-2">
                <i class="fas fa-paw text-2xl text-[#A67C52]"></i>
                <span class="text-2xl font-bold">PawConnect</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6">
        <div class="max-w-md w-full text-center">

            <h1 class="text-4xl font-extrabold mb-4">Application Received!</h1>
            <p class="text-[#7D5A44] text-lg mb-8 leading-relaxed">
                Thank you for choosing to adopt. Our team is currently reviewing your application and will reach out to you within <span class="font-bold text-[#5C3E2E]">48 hours</span>.
            </p>

            <div class="space-y-4">
                <a href="index.html" class="block w-full bg-[#A67C52] text-white py-4 rounded-xl font-bold hover:bg-[#5C3E2E] transition-all shadow-md">
                    Return to Home
                </a>
                <p class="text-sm text-[#A68966]">
                    A confirmation email has been sent to your inbox.
                </p>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-[#A68966] text-xs">
        &copy; 2026 PawConnect Rescue
    </footer>

</body>
</html>
